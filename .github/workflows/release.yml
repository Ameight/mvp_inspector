name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── 1. Source ZIP + создание релиза ──────────────────────────────────────────
  source-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source ZIP
        run: |
          TAG=${{ github.ref_name }}
          DIR="tl-ide-${TAG}"
          mkdir "$DIR"

          # Только нужные файлы — без .venv, .git, секретов
          cp main.py create_plugin.py marketplace_server.py \
             requirements.txt config.example.yaml \
             tl-ide.service Makefile run.sh run.bat \
             README.md DEVELOPMENT.md install.sh \
             "$DIR/"
          cp -r sdk "$DIR/sdk"
          chmod +x "$DIR/run.sh" "$DIR/install.sh"

          zip -r "tl-ide-${TAG}-source.zip" "$DIR/"

      - name: Create GitHub Release and upload source ZIP
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "tl-ide-${{ github.ref_name }}-source.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Сборка исполняемых файлов ─────────────────────────────────────────────
  build-exe:
    needs: source-zip
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller main.py \
            --name tl-ide \
            --onedir \
            --collect-all nicegui \
            --noconfirm

      - name: Archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r "../tl-ide-${{ github.ref_name }}-${{ matrix.label }}.zip" tl-ide/

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/tl-ide `
            -DestinationPath "tl-ide-${{ github.ref_name }}-${{ matrix.label }}.zip"

      - name: Upload to Release
        shell: bash
        run: |
          gh release upload ${{ github.ref_name }} \
            "tl-ide-${{ github.ref_name }}-${{ matrix.label }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
